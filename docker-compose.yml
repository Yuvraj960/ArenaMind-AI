version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arenamind-postgres
    environment:
      POSTGRES_USER: arenamind
      POSTGRES_PASSWORD: arenamind
      POSTGRES_DB: arenamind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenamind -d arenamind"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arenamind-network

  mongodb:
    image: mongo:7-alpine
    container_name: arenamind-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: arenamind
      MONGO_INITDB_ROOT_PASSWORD: arenamind
      MONGO_INITDB_DATABASE: arenamind
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arenamind-network

  redis:
    image: redis:7-alpine
    container_name: arenamind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arenamind-network

  qdrant:
    image: qdrant/qdrant:v1.10
    container_name: arenamind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arenamind-network

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3
    container_name: arenamind-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --scheduler-mode=reactive
      - --default-log-level=info
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --timeout 3s"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - arenamind-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arenamind-backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://arenamind:arenamind@postgres:5432/arenamind
      - MONGO_URL=mongodb://arenamind:arenamind@mongodb:27017/arenamind
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - REDPANDA_BROKERS=redpanda:9092
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./knowledge_base:/app/knowledge_base:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - arenamind-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arenamind-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - arenamind-network
    command: npm run dev

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
  redpanda_data:

networks:
  arenamind-network:
    driver: bridge